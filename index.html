<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Optiks Mechatronics</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="CSS.css">

</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<header class="bg-white shadow sticky top-0">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-red-500 text-white flex items-center justify-center rounded">
O
</div>

<h1 class="font-bold text-xl">
OPTIKS MECHATRONICS
</h1>

</div>

<nav class="flex gap-6 text-gray-600">
<a href="#home">Home</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>

</div>

</header>

<!-- HERO -->
<section id="home" class="text-center py-16 bg-white">

<h1 class="text-4xl font-bold mb-4">
Engineering the Future of Smart Lighting
</h1>

<p class="text-gray-600">
IP66 & IK Protected Professional Lighting Systems
</p>

</section>

<!-- PRODUCT SECTION -->

<section id="products" class="max-w-7xl mx-auto p-6">

<h2 class="text-3xl font-bold text-center mb-8">
Our Lighting Products
</h2>

<input
id="search"
placeholder="Search product..."
class="border p-3 w-full mb-8 rounded">

<div
id="product-grid"
class="grid md:grid-cols-3 gap-6">

</div>

</section>

<!-- PRODUCT MODAL -->

<div
id="modal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white p-6 rounded max-w-3xl w-full">

<button
onclick="closeModal()"
class="float-right text-red-500">
Close
</button>

<h2
id="modal-name"
class="text-2xl font-bold mb-3"></h2>

<p
id="modal-desc"
class="mb-4"></p>

<div
id="modal-specs"
class="space-y-2"></div>

</div>

</div>

<!-- FOOTER -->

<footer id="contact" class="bg-white mt-16 p-6 text-center">

<p class="text-gray-500">
© 2026 Optiks Mechatronics
</p>

</footer>

<!-- LOAD JAVASCRIPT -->
<script src="script.js"></script>

</body>
</html>
